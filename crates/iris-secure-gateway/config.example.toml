# Iris Secure Gateway 配置示例

[server]
host = "127.0.0.1"
port = 8080
base_dir = "./data"
assets_dir = "./assets"

[encryption]
key_file = "key.txt"
algorithm = "aes-256-gcm"

[key_rotation]
enabled = true
wasm_gateway_url = "http://127.0.0.1:9090"
check_interval_seconds = 3600
update_before_expiry_hours = 2

# 内部 API 认证令牌 - 必须与 iris-wasm-gateway 配置一致
internal_token = "change-me-in-production"

# 配置服务器 URL - 启用后自动从 iris-secure-config 轮询任务
config_server_url = "http://127.0.0.1:8081"
poll_interval_secs = 60

# 文件名映射: 真实文件名 -> 加密名
[file_mappings]
"secret/document.pdf" = "abc123"
"private/data.json" = "def456"
"config/settings.toml" = "xyz789"

# API 路由转发
[[api_routes]]
pattern = "^/api/v1/.*"
target = "http://localhost:3000"
methods = ["GET", "POST", "PUT", "DELETE"]

[[api_routes]]
pattern = "^/auth/.*"
target = "http://auth-server:8081"
methods = ["POST"]

[[api_routes]]
pattern = "^/static/.*"
target = "http://cdn-server:9000"
methods = ["GET"]
