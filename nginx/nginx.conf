# Iris Secure Gateway - Nginx Configuration
#
# 架构说明:
# - nginx 作为前端，接收所有请求
# - njs 处理路由映射和配置管理
# - 反向代理到 iris-secure-gateway (部署在公网)
# - WASM 和密钥通过 /iris.wasm 下发
#
# 依赖:
# - nginx >= 1.19 (需要 njs 模块)
# - nginx 配置: load_module modules/ngx_http_js_module.so;

# 用户和工作进程
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# 加载 njs 模块
load_module modules/ngx_http_js_module.so;

events {
    worker_connections 1024;
}

http {
    # 基础配置
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # 上游服务器定义
    upstream iris_backend {
        server 127.0.0.1:8080;  # iris-secure-gateway 地址
        keepalive 32;
    }

    # JS 模块配置
    js_import main from /etc/nginx/njs/iris_main.js;
    js_set $iris_config main.getConfig;

    # 定时器配置 (用于主动更新)
    # 每分钟检查一次配置是否即将过期
    js_periodic_main 60s;

    server {
        listen 443 ssl http2;
        server_name localhost;

        # SSL 配置
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ========================================
        # 健康检查端点
        # ========================================
        location = /health {
            js_content main.handleHealth;
            access_log off;
        }

        # ========================================
        # 配置刷新端点 (仅内部调用)
        # ========================================
        location = /api/refresh {
            js_content main.refreshConfig;
            # 限制刷新频率
            limit_req zone=refresh burst=5;
        }

        # ========================================
        # WASM 模块下发
        # ========================================
        location = /iris.wasm {
            # 反向代理到 iris-secure-gateway
            proxy_pass http://iris_backend/iris.wasm;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # WASM 内容类型
            add_header Content-Type "application/wasm" always;
            add_header Cache-Control "no-cache, no-store, must-revalidate";

            # 超时设置
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ========================================
        # 配置状态端点
        # ========================================
        location = /api/status {
            js_content main.getConfigStatus;
            add_header Content-Type "application/json";
        }

        # ========================================
        # WASM 请求处理 (支持缓存)
        # ========================================
        location = /iris.wasm {
            js_content main.handleWasmRequest;
        }

        # ========================================
        # 配置端点 (njs)
        # ========================================
        location = /api/config {
            js_content main.handleWasmConfig;
            add_header Content-Type "application/json";
            add_header Cache-Control "no-cache";
        }

        # ========================================
        # 公开配置端点 (不含密钥)
        # ========================================
        location = /api/public-config {
            proxy_pass http://iris_backend/api/public-config;
            add_header Content-Type "application/json";
        }

        # ========================================
        # 加密路由处理 (njs)
        # ========================================
        location /enc/ {
            js_content main.proxyRequest;

            # 反向代理到后端
            proxy_pass http://iris_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 请求体处理
            proxy_request_buffering off;
            proxy_buffering off;

            # 超时设置
            proxy_connect_timeout 15s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ========================================
        # 静态资源 (可选)
        # ========================================
        location /assets/ {
            proxy_pass http://iris_backend/assets/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;

            # 静态资源缓存
            add_header Cache-Control "public, max-age=86400";
        }

        # ========================================
        # API 代理
        # ========================================
        location /api/ {
            # 检查路由映射
            js_content main.proxyRequest;

            # 如果 njs 未处理，则转发到后端
            proxy_pass http://iris_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================================
        # 内部 API (需要认证)
        # ========================================
        location /internal/ {
            proxy_pass http://iris_backend/internal/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Internal-Token $http_x_internal_token;

            # 限制访问
            allow 127.0.0.1;
            deny all;
        }

        # ========================================
        # 根路径
        # ========================================
        location / {
            # 默认返回配置
            return 200 '{"status": "ok", "service": "iris-secure-gateway"}';
            add_header Content-Type "application/json";
        }
    }

    # ========================================
    # HTTP 重定向到 HTTPS
    # ========================================
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }
}