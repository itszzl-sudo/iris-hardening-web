internal_token = "demo-token-2024"

[server]
host = "0.0.0.0"
port = 8080
base_dir = "/tmp/iris-demo/data"
assets_dir = "/tmp/iris-demo/assets"
workers = 0

[encryption]
key_file = "/tmp/iris-demo/key.txt"
algorithm = "aes-256-gcm"

[key]
key_dir = "/tmp/iris-demo/keys"
validity_hours = 24
rotation_margin_hours = 2

[file_mappings]
"secret/photo1.dat" = "img01"
"secret/photo2.dat" = "img02"
"secret/photo3.dat" = "img03"
"secret/document.txt" = "doc99"

[[api_routes]]
pattern = "^/api/v1/.*"
target = "http://127.0.0.1:9999"
methods = ["GET", "POST"]
