"media/images/hero.png" = "h01"
"media/images/logo.png" = "lg01"
"media/images/office.png" = "of01"
"media/images/product1.png" = "p01"
"media/images/product2.png" = "p02"
"media/images/product3.png" = "p03"
"media/images/product4.png" = "p04"
"media/images/team1.png" = "t01"
"media/images/team2.png" = "t02"
"media/images/team3.png" = "t03"
"media/images/team4.png" = "t04"
"media/images/team5.png" = "t05"
# Audio
"media/audio/intro.wav" = "a01"
"media/audio/ambient.wav" = "a02"
"media/audio/notification.wav" = "a03"
# Video
"media/video/promo.mp4" = "v01"
# Old demo files
