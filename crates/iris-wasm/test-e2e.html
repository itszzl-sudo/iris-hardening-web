<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris WASM - E2E Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: monospace;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
        }
        h1 {
            margin-bottom: 20px;
            color: #4caf50;
        }
        .test-suite {
            margin-bottom: 30px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 8px;
            border-left: 3px solid #4caf50;
        }
        .test-case {
            padding: 10px;
            margin: 10px 0;
            background: #333;
            border-radius: 4px;
        }
        .test-case.pass {
            border-left: 3px solid #4caf50;
        }
        .test-case.fail {
            border-left: 3px solid #f44336;
        }
        .test-case.pending {
            border-left: 3px solid #ff9800;
        }
        .test-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .test-result {
            font-size: 12px;
            color: #aaa;
        }
        .test-result.pass {
            color: #4caf50;
        }
        .test-result.fail {
            color: #f44336;
        }
        canvas {
            border: 1px solid #444;
            margin: 10px 0;
        }
        .controls {
            margin: 20px 0;
        }
        button {
            background: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
        }
        button:hover {
            background: #45a049;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        #log {
            background: #000;
            padding: 10px;
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
            margin-top: 20px;
        }
        .log-entry {
            margin: 2px 0;
        }
        .log-entry.info {
            color: #2196f3;
        }
        .log-entry.success {
            color: #4caf50;
        }
        .log-entry.error {
            color: #f44336;
        }
    </style>
</head>
<body>
    <h1>Iris WASM - 端到端测试</h1>
    
    <div class="controls">
        <button id="run-all-tests">运行所有测试</button>
        <button id="test-tiles">测试分片渲染</button>
        <button id="test-watermark">测试水印裁剪</button>
        <button id="test-screenshot">测试截图检测</button>
        <button id="test-lsb-watermark">测试LSB图片码</button>
    </div>
    
    <div id="test-results"></div>
    
    <div id="log"></div>
    
    <script type="module">
        const resultsEl = document.getElementById('test-results');
        const logEl = document.getElementById('log');
        
        let testResults = {
            passed: 0,
            failed: 0,
            total: 0
        };
        
        function log(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }
        
        function createTestSuite(name) {
            const suite = document.createElement('div');
            suite.className = 'test-suite';
            suite.innerHTML = `<h2>${name}</h2>`;
            resultsEl.appendChild(suite);
            return suite;
        }
        
        function addTest(suite, name, passed, message = '') {
            const test = document.createElement('div');
            test.className = `test-case ${passed ? 'pass' : 'fail'}`;
            test.innerHTML = `
                <div class="test-name">${name}</div>
                <div class="test-result ${passed ? 'pass' : 'fail'}">${passed ? '✓ PASS' : '✗ FAIL'} ${message}</div>
            `;
            suite.appendChild(test);
            
            testResults.total++;
            if (passed) {
                testResults.passed++;
            } else {
                testResults.failed++;
            }
        }
        
        // Test 1: Fragmented Rendering
        async function testFragmentedRendering() {
            const suite = createTestSuite('分片渲染测试');
            log('开始分片渲染测试', 'info');
            
            try {
                const wasmModule = await import('./iris_wasm.js');
                await wasmModule.default();
                
                const engine = new wasmModule.IrisEngineWasm();
                addTest(suite, 'WASM 模块加载', true);
                
                engine.setup_fragmented_rendering(800, 600, 4, 3);
                addTest(suite, '分片渲染初始化 (4x3)', true);
                
                engine.shuffle_tiles();
                addTest(suite, '分片随机打乱', true);
                
                let tileCount = 0;
                let tile;
                while ((tile = engine.get_next_tile()) !== null) {
                    tileCount++;
                    engine.mark_tile_rendered(tile.id);
                }
                addTest(suite, `分片数量正确 (期望: 12, 实际: ${tileCount})`, tileCount === 12);
                
                const progress = engine.get_render_progress();
                addTest(suite, `渲染进度 (期望: 1.0, 实际: ${progress.toFixed(2)})`, progress === 1.0);
                
                const isComplete = engine.is_render_complete();
                addTest(suite, '渲染完成检查', isComplete);
                
                log('分片渲染测试完成', 'success');
            } catch (error) {
                addTest(suite, 'WASM 模块加载', false, error.message);
                log(`分片渲染测试失败: ${error.message}`, 'error');
            }
        }
        
        // Test 2: Watermark Clipping
        async function testWatermarkClipping() {
            const suite = createTestSuite('水印裁剪测试');
            log('开始水印裁剪测试', 'info');
            
            const testCases = [
                { width: 800, height: 600, desc: '正常画布 (800x600)' },
                { width: 400, height: 300, desc: '小画布 (400x300)' },
                { width: 200, height: 150, desc: '极小画布 (200x150)' },
                { width: 100, height: 56, desc: '临界画布 (100x56)' },
                { width: 50, height: 30, desc: '超小画布 (50x30)' },
            ];
            
            const watermarkText = 'hardening.irisverse.org';
            const fontSize = 56;
            
            for (const tc of testCases) {
                const canvas = document.createElement('canvas');
                canvas.width = tc.width;
                canvas.height = tc.height;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, tc.width, tc.height);
                
                ctx.globalAlpha = 0.15;
                ctx.font = `bold ${fontSize}px "Segoe UI", Arial, sans-serif`;
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                const textWidth = ctx.measureText(watermarkText).width;
                const textHeight = fontSize;
                
                const centerX = tc.width / 2;
                const centerY = tc.height / 2;
                
                const clipX = Math.max(0, centerX - textWidth / 2);
                const clipY = Math.max(0, centerY - textHeight / 2);
                const clipWidth = Math.min(textWidth, tc.width - clipX);
                const clipHeight = Math.min(textHeight, tc.height - clipY);
                
                if (clipWidth > 0 && clipHeight > 0) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(clipX, clipY, clipWidth, clipHeight);
                    ctx.clip();
                    ctx.fillText(watermarkText, centerX, centerY);
                    ctx.restore();
                }
                
                const imageData = ctx.getImageData(0, 0, tc.width, tc.height);
                const hasWhitePixels = imageData.data.some((v, i) => i % 4 === 0 && v > 0);
                
                addTest(suite, `${tc.desc} - 裁剪渲染`, true, `裁剪区域: ${clipWidth.toFixed(0)}x${clipHeight.toFixed(0)}`);
            }
            
            log('水印裁剪测试完成', 'success');
        }
        
        // Test 3: Screenshot Detection
        async function testScreenshotDetection() {
            const suite = createTestSuite('截图检测测试');
            log('开始截图检测测试', 'info');
            
            let screenshotDetected = false;
            const detectionMethods = [];
            
            const testHandler = (e) => {
                if (e.key === 'PrintScreen') {
                    detectionMethods.push('PrintScreen 键');
                    screenshotDetected = true;
                }
            };
            
            document.addEventListener('keydown', testHandler);
            addTest(suite, 'PrintScreen 监听器注册', true);
            
            const visibilityHandler = () => {
                if (document.hidden) {
                    detectionMethods.push('visibilitychange');
                    screenshotDetected = true;
                }
            };
            document.addEventListener('visibilitychange', visibilityHandler);
            addTest(suite, 'visibilitychange 监听器注册', true);
            
            const canvas = document.createElement('canvas');
            canvas.width = 400;
            canvas.height = 300;
            const ctx = canvas.getContext('2d');
            
            ctx.globalAlpha = 0.15;
            ctx.font = 'bold 56px "Segoe UI", Arial, sans-serif';
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('hardening.irisverse.org', 200, 150);
            
            const imageData = ctx.getImageData(180, 120, 40, 30);
            const hasWatermark = imageData.data.some((v, i) => i % 4 === 0 && v > 200);
            addTest(suite, '水印渲染验证', hasWatermark);
            
            log('截图检测测试完成', 'success');
            
            document.removeEventListener('keydown', testHandler);
            document.removeEventListener('visibilitychange', visibilityHandler);
        }
        
        // Test 4: Complete Rendering Flow
        async function testCompleteFlow() {
            const suite = createTestSuite('完整渲染流程测试');
            log('开始完整渲染流程测试', 'info');
            
            try {
                const wasmModule = await import('./iris_wasm.js');
                await wasmModule.default();
                
                const engine = new wasmModule.IrisEngineWasm();
                engine.enable_webgpu_monitor();
                addTest(suite, '引擎初始化', true);
                
                const canvas = document.createElement('canvas');
                canvas.width = 800;
                canvas.height = 600;
                const ctx = canvas.getContext('2d');
                
                engine.setup_fragmented_rendering(800, 600, 4, 3);
                engine.shuffle_tiles();
                
                let renderedCount = 0;
                let tile;
                
                while ((tile = engine.get_next_tile()) !== null) {
                    const { x, y, width, height, id } = tile;
                    
                    ctx.fillStyle = `hsl(${id * 40}, 60%, 50%)`;
                    ctx.fillRect(x, y, width, height);
                    
                    ctx.globalAlpha = 0.008;
                    ctx.font = 'bold 56px "Segoe UI", Arial, sans-serif';
                    ctx.fillStyle = '#fff';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('hardening.irisverse.org', 400, 300);
                    ctx.globalAlpha = 1;
                    
                    engine.mark_tile_rendered(tile.id);
                    renderedCount++;
                }
                
                addTest(suite, `分片逐个渲染 (${renderedCount} tiles)`, renderedCount === 12);
                
                const isComplete = engine.is_render_complete();
                addTest(suite, '渲染完成', isComplete);
                
                const progress = engine.get_render_progress();
                addTest(suite, `最终进度: ${(progress * 100).toFixed(0)}%`, progress === 1);
                
                const centerX = 400;
                const centerY = 300;
                const checkRadius = 50;
                const imageData = ctx.getImageData(
                    centerX - checkRadius, 
                    centerY - checkRadius, 
                    checkRadius * 2, 
                    checkRadius * 2
                );
                const hasContent = imageData.data.some(v => v > 0);
                addTest(suite, '画布内容验证', hasContent);
                
                log('完整渲染流程测试完成', 'success');
                
                suite.appendChild(canvas);
                canvas.style.maxWidth = '400px';
                canvas.style.border = '2px solid #4caf50';
                
            } catch (error) {
                addTest(suite, '完整渲染流程', false, error.message);
                log(`完整渲染流程测试失败: ${error.message}`, 'error');
            }
        }
        
        // Test 5: LSB Image Watermark
        async function testLSBWatermark() {
            const suite = createTestSuite('LSB图片码测试');
            log('开始LSB图片码测试', 'info');

            // LSB watermark algorithm (mirrors Rust ImageWatermarkEncoder)
            const MAGIC = [0x49, 0x52, 0x49, 0x53]; // "IRIS"

            function encodeLSB(pixels, text) {
                const payload = new TextEncoder().encode(text);
                const data = new Uint8Array(8 + payload.length);
                data.set(MAGIC, 0);
                new DataView(data.buffer).setUint32(4, payload.length, true);
                data.set(payload, 8);

                const result = new Uint8Array(pixels);
                const bitsNeeded = data.length * 4; // 4 2-bit groups per byte
                if (bitsNeeded > result.length / 4) {
                    log('图像太小无法编码水印', 'error');
                    return result;
                }

                let bitIdx = 0;
                for (const byte of data) {
                    for (let shift = 0; shift < 8; shift += 2) {
                        const twoBits = (byte >> shift) & 0x03;
                        const pixIdx = bitIdx * 4;
                        result[pixIdx] = (result[pixIdx] & 0xFC) | twoBits;
                        bitIdx++;
                    }
                }
                return result;
            }

            function decodeLSB(pixels) {
                const bits = [];
                for (let i = 0; i < pixels.length; i += 4) {
                    bits.push(pixels[i] & 0x03);
                    if (bits.length >= 16) {
                        const decoded = [];
                        for (let c = 0; c <= bits.length - 4; c += 4) {
                            decoded.push(bits[c] | (bits[c+1] << 2) | (bits[c+2] << 4) | (bits[c+3] << 6));
                        }
                        if (decoded.length >= 4 &&
                            decoded[0] === MAGIC[0] && decoded[1] === MAGIC[1] &&
                            decoded[2] === MAGIC[2] && decoded[3] === MAGIC[3]) {
                            if (decoded.length >= 8) {
                                const len = new DataView(new Uint8Array(decoded.slice(4, 8)).buffer).getUint32(0, true);
                                if (decoded.length >= 8 + len) {
                                    return new TextDecoder().decode(new Uint8Array(decoded.slice(8, 8 + len)));
                                }
                            }
                        }
                    }
                }
                return '';
            }

            function hasWatermark(pixels) {
                if (pixels.length < 64) return false;
                const bits = [];
                for (let i = 0; i < 64; i += 4) {
                    bits.push(pixels[i] & 0x03);
                }
                const decoded = [];
                for (let c = 0; c <= bits.length - 4; c += 4) {
                    decoded.push(bits[c] | (bits[c+1] << 2) | (bits[c+2] << 4) | (bits[c+3] << 6));
                }
                return decoded.length >= 4 &&
                    decoded[0] === MAGIC[0] && decoded[1] === MAGIC[1] &&
                    decoded[2] === MAGIC[2] && decoded[3] === MAGIC[3];
            }

            // Test 1: encode & decode roundtrip
            const canvas1 = document.createElement('canvas');
            canvas1.width = 200;
            canvas1.height = 200;
            const ctx1 = canvas1.getContext('2d');
            ctx1.fillStyle = '#336699';
            ctx1.fillRect(0, 0, 200, 200);
            const origData = ctx1.getImageData(0, 0, 200, 200);

            const testText = 'hardening.irisverse.org';
            const encoded = encodeLSB(origData.data, testText);
            const decoded = decodeLSB(encoded);
            addTest(suite, `编码-解码往返 (期望: "${testText}", 实际: "${decoded}")`, decoded === testText);

            // Test 2: has_watermark on encoded data
            const hasWm = hasWatermark(encoded);
            addTest(suite, '编码后检测水印', hasWm);

            // Test 3: has_watermark on unencoded data should be false
            const noWm = hasWatermark(origData.data);
            addTest(suite, '未编码数据无水印', !noWm);

            // Test 4: visual imperceptibility - pixel difference should be tiny
            let maxDiff = 0;
            for (let i = 0; i < encoded.length; i += 4) {
                const diff = Math.abs(encoded[i] - origData.data[i]);
                if (diff > maxDiff) maxDiff = diff;
            }
            addTest(suite, `视觉不可见性 (最大R通道偏差: ${maxDiff})`, maxDiff <= 3);

            // Test 5: Chinese text
            const canvas2 = document.createElement('canvas');
            canvas2.width = 200;
            canvas2.height = 200;
            const ctx2 = canvas2.getContext('2d');
            ctx2.fillStyle = '#996633';
            ctx2.fillRect(0, 0, 200, 200);
            const origData2 = ctx2.getImageData(0, 0, 200, 200);

            const chineseText = '虹膜安全水印测试';
            const encoded2 = encodeLSB(origData2.data, chineseText);
            const decoded2 = decodeLSB(encoded2);
            addTest(suite, `中文水印 (期望: "${chineseText}", 实际: "${decoded2}")`, decoded2 === chineseText);

            // Test 6: render encoded image on canvas to verify visual output
            const testCanvas = document.createElement('canvas');
            testCanvas.width = 200;
            testCanvas.height = 200;
            const testCtx = testCanvas.getContext('2d');
            const imgData = testCtx.createImageData(200, 200);
            imgData.data.set(encoded);
            testCtx.putImageData(imgData, 0, 0);
            addTest(suite, '编码图片渲染', true);

            suite.appendChild(testCanvas);
            testCanvas.style.maxWidth = '200px';
            testCanvas.style.border = '2px solid #2196f3';

            log('LSB图片码测试完成', 'success');
        }

        // Run all tests
        async function runAllTests() {
            testResults = { passed: 0, failed: 0, total: 0 };
            resultsEl.innerHTML = '';
            logEl.innerHTML = '';
            
            log('========== 开始端到端测试 ==========', 'info');
            
            await testFragmentedRendering();
            await testWatermarkClipping();
            await testScreenshotDetection();
            await testCompleteFlow();
            await testLSBWatermark();
            
            log('========== 测试完成 ==========', 'info');
            log(`总计: ${testResults.total} | 通过: ${testResults.passed} | 失败: ${testResults.failed}`, 
                testResults.failed === 0 ? 'success' : 'error');
            
            const summary = document.createElement('div');
            summary.className = 'test-suite';
            summary.innerHTML = `
                <h2>测试总结</h2>
                <div class="test-case ${testResults.failed === 0 ? 'pass' : 'fail'}">
                    <div class="test-name">总计</div>
                    <div class="test-result">通过: ${testResults.passed} / ${testResults.total}</div>
                </div>
            `;
            resultsEl.insertBefore(summary, resultsEl.firstChild);
        }
        
        // Event listeners
        document.getElementById('run-all-tests').addEventListener('click', runAllTests);
        document.getElementById('test-tiles').addEventListener('click', testFragmentedRendering);
        document.getElementById('test-watermark').addEventListener('click', testWatermarkClipping);
        document.getElementById('test-screenshot').addEventListener('click', testScreenshotDetection);
        document.getElementById('test-lsb-watermark').addEventListener('click', testLSBWatermark);
        
        // Auto-run on load
        log('E2E Test Suite 已就绪', 'info');
    </script>
</body>
</html>
